<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Position Editor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjs@15.1.1/lib/browser/math.js"></script>
  <script type="importmap">
  {
    "imports": {
      "mathjs": "./tikz-svg/examples-v2/mathjs-shim.js"
    }
  }
  </script>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { background: #1e1e1e; color: #d4d4d4; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

    .toolbar { background: #2d2d2d; border-bottom: 1px solid #444; padding: 0.4rem 1rem; display: flex; align-items: center; gap: 0.75rem; }
    .toolbar .btn { font-size: 0.8rem; }
    .toolbar .filename { color: #9cdcfe; font-family: monospace; font-size: 0.85rem; }
    .toolbar .hint { color: #888; font-size: 0.75rem; margin-left: auto; }

    .main-area { display: flex; height: calc(100vh - 42px); }

    /* SVG panel */
    .svg-panel { flex: 7; background: #fdf6e3; display: flex; align-items: center; justify-content: center; overflow: auto; position: relative; }
    .svg-panel svg { max-width: 95%; max-height: 95%; }

    /* Table panel */
    .table-panel { flex: 5; overflow-y: auto; padding: 0.5rem; background: #252526; }

    .node-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .node-table th { position: sticky; top: 0; background: #333; color: #ccc; padding: 0.3rem 0.5rem; text-align: left; border-bottom: 2px solid #555; z-index: 1; }
    .node-table td { padding: 0.25rem 0.5rem; border-bottom: 1px solid #333; white-space: nowrap; }
    .node-table tr { cursor: pointer; }
    .node-table tr:hover { background: #2a2d2e; }
    .node-table tr.selected { background: #264f78; }
    .node-table .id-col { color: #9cdcfe; font-family: monospace; }
    .node-table .label-col { color: #ce9178; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
    .node-table .coord-input {
      width: 58px; background: #1e1e1e; border: 1px solid #444; color: #b5cea8;
      font-family: monospace; font-size: 0.8rem; padding: 0.15rem 0.3rem; text-align: right; border-radius: 3px;
    }
    .node-table .coord-input:focus { border-color: #007acc; outline: none; }
    .node-table .anchor-col { color: #888; font-size: 0.75rem; }

    /* Highlight ring around selected node in SVG */
    .highlight-ring { stroke: #ff0; stroke-width: 3; fill: rgba(255,255,0,0.15); pointer-events: none; }

    .status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #007acc; color: #fff; font-size: 0.75rem; padding: 0.15rem 1rem; z-index: 10; }
  </style>
</head>
<body>

  <div class="toolbar">
    <button class="btn btn-sm btn-outline-light" id="btn-open">Open HTML</button>
    <button class="btn btn-sm btn-outline-success" id="btn-save" disabled>Save</button>
    <span class="filename" id="filename">No file loaded</span>
    <span class="hint">Arrows: move &nbsp; Shift: 5x &nbsp; Tab: next row &nbsp; Enter: edit field</span>
  </div>

  <div class="main-area">
    <div class="svg-panel" id="svg-panel">
      <div style="color:#888; text-align:center;">Open an HTML file with a tikz-svg <code>render()</code> call</div>
    </div>
    <div class="table-panel" id="table-panel">
      <table class="node-table">
        <thead><tr><th>ID</th><th>Label</th><th>Q</th><th>P</th><th>Anchor</th></tr></thead>
        <tbody id="node-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="status-bar" id="status-bar">Ready</div>

  <script type="module">
    // ── State ──
    let fileHandle = null;
    let sourceText = '';
    let config = null;
    let svgEl = null;
    let nodes = [];       // { index, id, label, Q, P, anchor, origQ, origP }
    let selectedIdx = -1; // index into nodes[]
    let highlightEl = null;
    let renderFn = null;  // captured render function

    const svgPanel  = document.getElementById('svg-panel');
    const tbody     = document.getElementById('node-tbody');
    const statusBar = document.getElementById('status-bar');
    const btnOpen   = document.getElementById('btn-open');
    const btnSave   = document.getElementById('btn-save');
    const fileLabel = document.getElementById('filename');

    function setStatus(msg) { statusBar.textContent = msg; }

    // ── File Open ──
    btnOpen.addEventListener('click', async () => {
      try {
        [fileHandle] = await window.showOpenFilePicker({
          types: [{ description: 'HTML', accept: { 'text/html': ['.html'] } }]
        });
        const file = await fileHandle.getFile();
        sourceText = await file.text();
        fileLabel.textContent = file.name;
        setStatus(`Loaded ${file.name}`);
        await loadGraph();
      } catch (e) {
        if (e.name !== 'AbortError') setStatus('Open failed: ' + e.message);
      }
    });

    // ── Config Extraction ──
    async function loadGraph() {
      config = null;
      renderFn = null;

      // Extract the module script block
      const scriptMatch = sourceText.match(/<script\s+type\s*=\s*["']module["'][^>]*>([\s\S]*?)<\/script>/);
      if (!scriptMatch) { setStatus('No module script found'); return; }

      let scriptBody = scriptMatch[1];

      // Create an SVG element for rendering
      svgPanel.innerHTML = '';
      svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');

      // Copy width/height from source if present
      const svgMatch = sourceText.match(/<svg[^>]*id\s*=\s*["'][^'"]*["'][^>]*/);
      if (svgMatch) {
        const wm = svgMatch[0].match(/width\s*=\s*["'](\d+)["']/);
        const hm = svgMatch[0].match(/height\s*=\s*["'](\d+)["']/);
        if (wm) svgEl.setAttribute('width', wm[1]);
        if (hm) svgEl.setAttribute('height', hm[1]);
      }
      svgEl.style.display = 'block';
      svgPanel.appendChild(svgEl);

      // Intercept render() to capture config
      let capturedConfig = null;
      let capturedRefs = null;

      // Execute via dynamic module using blob URL
      const blobCode = `
        export default async function(__svgTarget, __captureCallback, __realRenderModule) {
          const { render: __realRender } = __realRenderModule;
          function __interceptedRender(target, cfg) {
            const refs = __realRender(target, cfg);
            __captureCallback(cfg, refs);
            return refs;
          }
          ${scriptBody
            .replace(/import\s*\{([^}]*)\}\s*from\s*['"][^'"]*index\.js['"]\s*;?/g, '')
            .replace(/document\.getElementById\s*\(\s*['"][^'"]*['"]\s*\)/g, '__svgTarget')
            .replace(/render\s*\(\s*document\.getElementById\s*\(\s*['"][^'"]*['"]\s*\)\s*,/g, '__interceptedRender(__svgTarget,')
            .replace(/\brender\s*\(/g, '__interceptedRender(')
          }
        }
      `;

      try {
        const renderModule = await import('./tikz-svg/src-v2/index.js');
        const blob = new Blob([blobCode], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const mod = await import(url);
        URL.revokeObjectURL(url);

        await mod.default(svgEl, (cfg, refs) => {
          capturedConfig = cfg;
          capturedRefs = refs;
        }, renderModule);

        if (!capturedConfig) { setStatus('render() was not called'); return; }

        config = capturedConfig;
        renderFn = renderModule.render;

        // Discover nodes
        discoverNodes();
        buildTable();
        btnSave.disabled = false;
        setStatus(`Found ${nodes.length} nodes`);
      } catch (e) {
        setStatus('Script error: ' + e.message);
        console.error(e);
      }
    }

    // ── Node Discovery ──
    function discoverNodes() {
      nodes = [];
      if (!config || !config.draw) return;
      config.draw.forEach((item, index) => {
        if (item.type !== 'node' || !item.id) return;
        const pos = item.position;
        // Handle both { x, y } and [x, y] formats
        const rawX = Array.isArray(pos) ? pos[0] : pos.x;
        const rawY = Array.isArray(pos) ? pos[1] : pos.y;
        const Q = rawX;
        const P = -rawY;  // economics convention
        const label = Array.isArray(item.label) ? item.label[0] + '...' : (item.label || '');
        nodes.push({
          index,
          id: item.id,
          label,
          Q, P,
          origQ: Q, origP: P,
          anchor: item.anchor || 'center'
        });
      });
    }

    // ── Table ──
    function buildTable() {
      tbody.innerHTML = '';
      nodes.forEach((n, i) => {
        const tr = document.createElement('tr');
        tr.dataset.nodeIndex = i;
        tr.innerHTML = `
          <td class="id-col">${n.id}</td>
          <td class="label-col" title="${esc(n.label)}">${esc(n.label)}</td>
          <td><input class="coord-input q-input" type="number" step="1" value="${n.Q}" data-i="${i}"></td>
          <td><input class="coord-input p-input" type="number" step="1" value="${n.P}" data-i="${i}"></td>
          <td class="anchor-col">${n.anchor}</td>
        `;
        tr.addEventListener('click', (e) => {
          if (e.target.tagName === 'INPUT') return;
          selectRow(i);
        });
        tbody.appendChild(tr);
      });

      // Input change handlers
      tbody.querySelectorAll('.q-input').forEach(inp => {
        inp.addEventListener('change', (e) => {
          const i = +e.target.dataset.i;
          nodes[i].Q = parseFloat(e.target.value) || 0;
          updateNodePosition(i);
        });
        inp.addEventListener('focus', (e) => selectRow(+e.target.dataset.i));
      });
      tbody.querySelectorAll('.p-input').forEach(inp => {
        inp.addEventListener('change', (e) => {
          const i = +e.target.dataset.i;
          nodes[i].P = parseFloat(e.target.value) || 0;
          updateNodePosition(i);
        });
        inp.addEventListener('focus', (e) => selectRow(+e.target.dataset.i));
      });
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── Selection & Highlight ──
    function selectRow(i) {
      selectedIdx = i;
      // Update row highlights
      tbody.querySelectorAll('tr').forEach((tr, idx) => {
        tr.classList.toggle('selected', idx === i);
      });
      // Highlight node in SVG
      highlightNode(nodes[i]);
      setStatus(`Selected: ${nodes[i].id}  (Q=${nodes[i].Q}, P=${nodes[i].P})`);
    }

    function highlightNode(n) {
      if (highlightEl) highlightEl.remove();
      if (!svgEl) return;

      const item = config.draw[n.index];
      // Find the rendered node group by id
      const group = svgEl.querySelector(`[data-id="${n.id}"]`);
      if (group) {
        const bbox = group.getBBox();
        highlightEl = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        highlightEl.setAttribute('x', bbox.x - 4);
        highlightEl.setAttribute('y', bbox.y - 4);
        highlightEl.setAttribute('width', bbox.width + 8);
        highlightEl.setAttribute('height', bbox.height + 8);
        highlightEl.setAttribute('rx', 3);
        highlightEl.classList.add('highlight-ring');
        svgEl.appendChild(highlightEl);
      }
    }

    // ── Position Update ──
    function updateNodePosition(i) {
      const n = nodes[i];
      config.draw[n.index].position = { x: n.Q, y: -n.P };

      // Re-render
      renderFn(svgEl, config);

      // Update input values in table
      const tr = tbody.children[i];
      tr.querySelector('.q-input').value = n.Q;
      tr.querySelector('.p-input').value = n.P;

      // Re-highlight
      if (selectedIdx === i) highlightNode(n);
      setStatus(`Moved ${n.id} to (Q=${n.Q}, P=${n.P})`);
    }

    // ── Keyboard Controls ──
    document.addEventListener('keydown', (e) => {
      // Don't intercept if user is typing in an input (unless arrow keys)
      const inInput = e.target.tagName === 'INPUT';

      if (e.key === 'Tab') {
        e.preventDefault();
        if (nodes.length === 0) return;
        const dir = e.shiftKey ? -1 : 1;
        const next = (selectedIdx + dir + nodes.length) % nodes.length;
        selectRow(next);
        // Scroll row into view
        tbody.children[next].scrollIntoView({ block: 'nearest' });
        return;
      }

      if (inInput && !['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) return;

      if (selectedIdx < 0 || selectedIdx >= nodes.length) return;
      const n = nodes[selectedIdx];
      const step = e.shiftKey ? 5 : 1;

      switch (e.key) {
        case 'ArrowRight': e.preventDefault(); n.Q += step; updateNodePosition(selectedIdx); break;
        case 'ArrowLeft':  e.preventDefault(); n.Q -= step; updateNodePosition(selectedIdx); break;
        case 'ArrowUp':    e.preventDefault(); n.P += step; updateNodePosition(selectedIdx); break;
        case 'ArrowDown':  e.preventDefault(); n.P -= step; updateNodePosition(selectedIdx); break;
      }
    });

    // ── Save ──
    btnSave.addEventListener('click', async () => {
      if (!fileHandle || !sourceText) return;

      let newText = sourceText;
      let changed = 0;

      for (const n of nodes) {
        if (n.Q === n.origQ && n.P === n.origP) continue;

        // Find the line with this node's id and replace position numbers
        // Handles: position: { x, y } and position: [x, y]
        const idEsc = n.id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

        // Try position: { x: ..., y: ... } pattern (id before position)
        const posObjRegex = new RegExp(
          `(id:\\s*'${idEsc}'[\\s\\S]*?position:\\s*\\{\\s*x:\\s*)(-?[\\d.]+)(\\s*,\\s*y:\\s*)(-?[\\d.]+)`,
        );
        if (posObjRegex.test(newText)) {
          newText = newText.replace(posObjRegex, `$1${n.Q}$3${-n.P}`);
          changed++;
          continue;
        }

        // Reverse: position: { x, y } before id
        const posObjRegex2 = new RegExp(
          `(position:\\s*\\{\\s*x:\\s*)(-?[\\d.]+)(\\s*,\\s*y:\\s*)(-?[\\d.]+)([\\s\\S]*?id:\\s*'${idEsc}')`,
        );
        if (posObjRegex2.test(newText)) {
          newText = newText.replace(posObjRegex2, `$1${n.Q}$3${-n.P}$5`);
          changed++;
          continue;
        }

        // Try position: [x, y] array pattern (id before position)
        const posArrRegex = new RegExp(
          `(id:\\s*'${idEsc}'[\\s\\S]*?position:\\s*\\[\\s*)(-?[\\d.]+)(\\s*,\\s*)(-?[\\d.]+)(\\s*\\])`,
        );
        if (posArrRegex.test(newText)) {
          newText = newText.replace(posArrRegex, `$1${n.Q}$3${-n.P}$5`);
          changed++;
          continue;
        }

        // Reverse: position: [x, y] before id
        const posArrRegex2 = new RegExp(
          `(position:\\s*\\[\\s*)(-?[\\d.]+)(\\s*,\\s*)(-?[\\d.]+)(\\s*\\][\\s\\S]*?id:\\s*'${idEsc}')`,
        );
        if (posArrRegex2.test(newText)) {
          newText = newText.replace(posArrRegex2, `$1${n.Q}$3${-n.P}$5`);
          changed++;
        }
      }

      try {
        const writable = await fileHandle.createWritable();
        await writable.write(newText);
        await writable.close();
        sourceText = newText;
        // Update originals
        for (const n of nodes) { n.origQ = n.Q; n.origP = n.P; }
        setStatus(`Saved ${changed} change(s)`);
      } catch (e) {
        setStatus('Save failed: ' + e.message);
      }
    });

    // ── Ctrl+S shortcut ──
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        btnSave.click();
      }
    });
  </script>
</body>
</html>
